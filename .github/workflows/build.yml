name: Build Swift Tree-sitter .xcframework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Build parser and diagnostics library
        run: |
          cd tree-sitter
          tree-sitter generate

          # Clone tree-sitter to get the runtime
          git clone --depth 1 https://github.com/tree-sitter/tree-sitter.git ts-runtime

          # Compile runtime for multiple architectures
          mkdir -p build/ios-arm64
          mkdir -p build/ios-simulator-arm64
          mkdir -p build/ios-simulator-x86_64

          # iOS Device
          xcrun -sdk iphoneos clang -c ts-runtime/lib/src/lib.c -Its-runtime/lib/include -Its-runtime/lib/src -arch arm64 -miphoneos-version-min=12.0 -o libts.o
          xcrun -sdk iphoneos clang -c src/parser.c src/scanner.c src/diagnostics.c -Isrc -Iinclude -Its-runtime/lib/include -arch arm64 -miphoneos-version-min=12.0
          ar rcs build/ios-arm64/libtree-sitter-swift.a parser.o scanner.o diagnostics.o libts.o
          rm *.o

          # iOS Simulator ARM64
          xcrun -sdk iphonesimulator clang -c ts-runtime/lib/src/lib.c -Its-runtime/lib/include -Its-runtime/lib/src -arch arm64 -miphonesimulator-version-min=12.0 -o libts.o
          xcrun -sdk iphonesimulator clang -c src/parser.c src/scanner.c src/diagnostics.c -Isrc -Iinclude -Its-runtime/lib/include -arch arm64 -miphonesimulator-version-min=12.0
          ar rcs build/ios-simulator-arm64/libtree-sitter-swift.a parser.o scanner.o diagnostics.o libts.o
          rm *.o

          # iOS Simulator x86_64
          xcrun -sdk iphonesimulator clang -c ts-runtime/lib/src/lib.c -Its-runtime/lib/include -Its-runtime/lib/src -arch x86_64 -miphonesimulator-version-min=12.0 -o libts.o
          xcrun -sdk iphonesimulator clang -c src/parser.c src/scanner.c src/diagnostics.c -Isrc -Iinclude -Its-runtime/lib/include -arch x86_64 -miphonesimulator-version-min=12.0
          ar rcs build/ios-simulator-x86_64/libtree-sitter-swift.a parser.o scanner.o diagnostics.o libts.o
          rm *.o

          # Create XCFramework
          xcodebuild -create-xcframework \
            -library build/ios-arm64/libtree-sitter-swift.a -headers include -headers ts-runtime/lib/include \
            -library build/ios-simulator-arm64/libtree-sitter-swift.a -headers include -headers ts-runtime/lib/include \
            -library build/ios-simulator-x86_64/libtree-sitter-swift.a -headers include -headers ts-runtime/lib/include \
            -output build/SwiftTreeSitter.xcframework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftTreeSitter.xcframework
          path: tree-sitter/build/SwiftTreeSitter.xcframework
